<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/></filter>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="780" height="440" rx="12" fill="#0f172a"/>
  <text x="390" y="30" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Offline-first: архитектура @letar/forms</text>

  <!-- Пользователь -->
  <rect x="20" y="60" width="140" height="60" rx="10" fill="#6366f1" filter="url(#s)"/>
  <text x="90" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="600">Пользователь</text>
  <text x="90" y="102" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">заполняет форму</text>

  <!-- Form компонент -->
  <rect x="200" y="50" width="180" height="80" rx="10" fill="#7c3aed" filter="url(#s)"/>
  <text x="290" y="78" text-anchor="middle" fill="white" font-size="13" font-weight="600">&lt;Form offline&gt;</text>
  <text x="290" y="96" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">useOfflineForm()</text>
  <text x="290" y="112" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">+ OfflineIndicator</text>

  <!-- Стрелка user → form -->
  <line x1="160" y1="90" x2="195" y2="90" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Стрелка form → submit -->
  <line x1="380" y1="90" x2="415" y2="90" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Развилка Online/Offline -->
  <rect x="420" y="50" width="100" height="80" rx="10" fill="#334155" filter="url(#s)"/>
  <text x="470" y="80" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">onSubmit</text>
  <text x="470" y="98" text-anchor="middle" fill="#94a3b8" font-size="9">online?</text>
  <text x="470" y="114" text-anchor="middle" fill="#94a3b8" font-size="9">offline?</text>

  <!-- === ONLINE PATH (зелёный, вверх) === -->
  <line x1="470" y1="50" x2="470" y2="20" stroke="#22c55e" stroke-width="2"/>
  <line x1="470" y1="20" x2="690" y2="20" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>

  <rect x="560" y="50" width="200" height="44" rx="8" fill="#166534" filter="url(#s)"/>
  <text x="660" y="68" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Online → Server Action</text>
  <text x="660" y="82" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">POST /api → БД</text>
  <text x="538" y="16" fill="#22c55e" font-size="9">✓ online</text>

  <!-- === OFFLINE PATH (красный/оранжевый, вниз) === -->
  <line x1="470" y1="130" x2="470" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="484" y="155" fill="#f59e0b" font-size="9">✗ offline</text>

  <!-- IndexedDB -->
  <rect x="380" y="170" width="180" height="52" rx="10" fill="#92400e" filter="url(#s)"/>
  <text x="470" y="193" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">IndexedDB</text>
  <text x="470" y="210" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">SyncQueue хранилище</text>

  <!-- SyncQueue -->
  <rect x="380" y="250" width="180" height="52" rx="10" fill="#0369a1" filter="url(#s)"/>
  <text x="470" y="273" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">SyncQueue</text>
  <text x="470" y="290" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">FIFO + retry + backoff</text>
  <line x1="470" y1="222" x2="470" y2="246" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Network восстановлен -->
  <rect x="380" y="330" width="180" height="44" rx="10" fill="#334155" filter="url(#s)"/>
  <text x="470" y="350" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">navigator.onLine</text>
  <text x="470" y="366" text-anchor="middle" fill="#94a3b8" font-size="9">событие: online</text>
  <line x1="470" y1="302" x2="470" y2="326" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Стрелка: sync → server -->
  <line x1="560" y1="352" x2="660" y2="352" stroke="#22c55e" stroke-width="2"/>
  <line x1="660" y1="352" x2="660" y2="100" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="670" y="230" fill="#22c55e" font-size="9" transform="rotate(90, 670, 230)">синхронизация</text>

  <!-- Persistence (localStorage) -->
  <rect x="140" y="170" width="200" height="52" rx="10" fill="#581c87" filter="url(#s)"/>
  <text x="240" y="193" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">localStorage (draft)</text>
  <text x="240" y="210" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">useFormPersistence()</text>
  <line x1="290" y1="130" x2="290" y2="145" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="290" y1="145" x2="240" y2="145" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="240" y1="145" x2="240" y2="166" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Стрелка draft → restore -->
  <line x1="240" y1="222" x2="240" y2="260" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Recovery Dialog -->
  <rect x="140" y="260" width="200" height="44" rx="10" fill="#4c1d95" filter="url(#s)"/>
  <text x="240" y="280" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Восстановить черновик?</text>
  <text x="240" y="296" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">ClearDraftButton / RestoreDialog</text>

  <!-- SyncStatus UI -->
  <rect x="20" y="170" width="100" height="134" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="70" y="192" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">UI статус</text>
  <text x="70" y="214" text-anchor="middle" fill="#22c55e" font-size="9">● Online</text>
  <text x="70" y="232" text-anchor="middle" fill="#ef4444" font-size="9">● Offline</text>
  <text x="70" y="250" text-anchor="middle" fill="#f59e0b" font-size="9">● Syncing...</text>
  <text x="70" y="268" text-anchor="middle" fill="#22c55e" font-size="9">● Synced ✓</text>
  <text x="70" y="286" text-anchor="middle" fill="#ef4444" font-size="9">● Error ✗</text>

  <!-- Нижняя полоса с метриками -->
  <rect x="20" y="400" width="740" height="30" rx="6" fill="#1e293b" opacity="0.5"/>
  <text x="390" y="420" text-anchor="middle" fill="#64748b" font-size="10">IndexedDB: ~2 KB / форма | SyncQueue: FIFO, retry 3×, exponential backoff | TTL: 7 дней</text>
</svg>
