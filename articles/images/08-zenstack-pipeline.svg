<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/></filter>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Фон -->
  <rect width="780" height="380" rx="12" fill="#0f172a"/>
  <text x="390" y="32" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="bold">От БД до UI: ZenStack → Zod → React</text>

  <!-- Шаг 1: schema.zmodel -->
  <rect x="20" y="60" width="140" height="80" rx="10" fill="url(#g1)" filter="url(#s)"/>
  <text x="90" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="600">schema</text>
  <text x="90" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">.zmodel</text>
  <text x="90" y="156" text-anchor="middle" fill="#a5b4fc" font-size="9">Модели + @form.*</text>
  <text x="90" y="170" text-anchor="middle" fill="#a5b4fc" font-size="9">директивы</text>

  <!-- Стрелка 1→2 -->
  <line x1="160" y1="100" x2="195" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Шаг 2: zenstack:generate -->
  <rect x="200" y="60" width="140" height="80" rx="10" fill="url(#g2)" filter="url(#s)"/>
  <text x="270" y="88" text-anchor="middle" fill="white" font-size="13" font-weight="600">zenstack:</text>
  <text x="270" y="106" text-anchor="middle" fill="white" font-size="13" font-weight="600">generate</text>
  <text x="270" y="156" text-anchor="middle" fill="#fcd34d" font-size="9">Prisma + Zod</text>
  <text x="270" y="170" text-anchor="middle" fill="#fcd34d" font-size="9">+ form schemas</text>

  <!-- Стрелка 2→3 -->
  <line x1="340" y1="100" x2="375" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Шаг 3: Zod Schemas -->
  <rect x="380" y="60" width="140" height="80" rx="10" fill="url(#g3)" filter="url(#s)"/>
  <text x="450" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="600">Zod Schemas</text>
  <text x="450" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">+ .meta()</text>
  <text x="450" y="156" text-anchor="middle" fill="#6ee7b7" font-size="9">Валидация + UI</text>
  <text x="450" y="170" text-anchor="middle" fill="#6ee7b7" font-size="9">метаданные</text>

  <!-- Стрелка 3→4 -->
  <line x1="520" y1="100" x2="555" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Шаг 4: Form Component -->
  <rect x="560" y="60" width="140" height="80" rx="10" fill="url(#g4)" filter="url(#s)"/>
  <text x="630" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="600">&lt;Form&gt;</text>
  <text x="630" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">React UI</text>
  <text x="630" y="156" text-anchor="middle" fill="#93c5fd" font-size="9">Декларативный</text>
  <text x="630" y="170" text-anchor="middle" fill="#93c5fd" font-size="9">compound API</text>

  <!-- 4 уровня контроля -->
  <text x="390" y="216" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">4 уровня контроля</text>

  <!-- Уровень 1: FromSchema -->
  <rect x="20" y="238" width="170" height="56" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="105" y="260" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Form.FromSchema</text>
  <text x="105" y="278" text-anchor="middle" fill="#64748b" font-size="9">0 строк JSX — всё из схемы</text>

  <!-- Уровень 2: AutoFields -->
  <rect x="210" y="238" width="170" height="56" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="295" y="260" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">AutoFields</text>
  <text x="295" y="278" text-anchor="middle" fill="#64748b" font-size="9">Авто + кастомизация</text>

  <!-- Уровень 3: Field.* -->
  <rect x="400" y="238" width="170" height="56" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="485" y="260" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Form.Field.*</text>
  <text x="485" y="278" text-anchor="middle" fill="#64748b" font-size="9">Полный контроль layout</text>

  <!-- Уровень 4: useAppForm -->
  <rect x="590" y="238" width="170" height="56" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="675" y="260" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">useAppForm</text>
  <text x="675" y="278" text-anchor="middle" fill="#64748b" font-size="9">Legacy / максимальный</text>

  <!-- Стрелка спектра -->
  <line x1="40" y1="310" x2="740" y2="310" stroke="#334155" stroke-width="2"/>
  <polygon points="740,306 750,310 740,314" fill="#334155"/>
  <text x="40" y="332" fill="#6366f1" font-size="9">Минимум кода</text>
  <text x="700" y="332" fill="#3b82f6" font-size="9" text-anchor="end">Максимум контроля</text>

  <!-- Метрики -->
  <rect x="20" y="348" width="740" height="24" rx="4" fill="#1e293b" opacity="0.6"/>
  <text x="390" y="365" text-anchor="middle" fill="#64748b" font-size="10">driving-school: 89 моделей, 93 @form.* директивы → генерация за 12 с</text>
</svg>
