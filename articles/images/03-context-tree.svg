<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.2"/></filter>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="480" rx="12" fill="#0f172a"/>
  <text x="350" y="30" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Context API: дерево компонентов @letar/forms</text>

  <!-- Form (root) -->
  <rect x="260" y="50" width="180" height="44" rx="8" fill="#7c3aed" filter="url(#s)"/>
  <text x="350" y="77" text-anchor="middle" fill="white" font-size="13" font-weight="600">&lt;Form&gt;</text>
  <text x="350" y="106" text-anchor="middle" fill="#a78bfa" font-size="9">FormContext + TanStack Form</text>

  <!-- Ветки от Form -->
  <line x1="200" y1="94" x2="200" y2="140" stroke="#475569" stroke-width="1.5"/>
  <line x1="350" y1="94" x2="350" y2="140" stroke="#475569" stroke-width="1.5"/>
  <line x1="530" y1="94" x2="530" y2="140" stroke="#475569" stroke-width="1.5"/>
  <line x1="200" y1="94" x2="530" y2="94" stroke="#475569" stroke-width="1.5"/>

  <!-- Form.Group -->
  <rect x="120" y="140" width="160" height="40" rx="8" fill="#2563eb" filter="url(#s)"/>
  <text x="200" y="165" text-anchor="middle" fill="white" font-size="12" font-weight="600">&lt;Form.Group&gt;</text>
  <text x="200" y="194" text-anchor="middle" fill="#60a5fa" font-size="9">GroupContext (path prefix)</text>

  <!-- Form.Steps -->
  <rect x="290" y="140" width="120" height="40" rx="8" fill="#0891b2" filter="url(#s)"/>
  <text x="350" y="165" text-anchor="middle" fill="white" font-size="12" font-weight="600">&lt;Form.Steps&gt;</text>
  <text x="350" y="194" text-anchor="middle" fill="#67e8f9" font-size="9">StepsContext (activeStep)</text>

  <!-- Form.Watch / When / Features -->
  <rect x="440" y="140" width="180" height="40" rx="8" fill="#059669" filter="url(#s)"/>
  <text x="530" y="165" text-anchor="middle" fill="white" font-size="11" font-weight="600">Watch | When | Features</text>
  <text x="530" y="194" text-anchor="middle" fill="#6ee7b7" font-size="9">Подписка на изменения полей</text>

  <!-- Ветки от Group -->
  <line x1="120" y1="180" x2="120" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="280" y1="180" x2="280" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="120" y1="180" x2="280" y2="180" stroke="#475569" stroke-width="1.5"/>

  <!-- Form.Group.List -->
  <rect x="30" y="230" width="180" height="40" rx="8" fill="#1d4ed8" filter="url(#s)"/>
  <text x="120" y="255" text-anchor="middle" fill="white" font-size="11" font-weight="600">&lt;Form.Group.List&gt;</text>
  <text x="120" y="284" text-anchor="middle" fill="#93c5fd" font-size="9">Массив объектов [index]</text>

  <!-- Form.Field.* -->
  <rect x="230" y="230" width="140" height="40" rx="8" fill="#16a34a" filter="url(#s)"/>
  <text x="300" y="255" text-anchor="middle" fill="white" font-size="12" font-weight="600">&lt;Form.Field.*&gt;</text>
  <text x="300" y="284" text-anchor="middle" fill="#86efac" font-size="9">FieldContext → Chakra UI</text>

  <!-- Ветки от Group.List -->
  <line x1="60" y1="270" x2="60" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="180" y1="270" x2="180" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="60" y1="270" x2="180" y2="270" stroke="#475569" stroke-width="1.5"/>

  <!-- Add/Remove/DragHandle -->
  <rect x="10" y="320" width="100" height="36" rx="6" fill="#1e40af" filter="url(#s)"/>
  <text x="60" y="343" text-anchor="middle" fill="white" font-size="9" font-weight="600">Add / Remove</text>

  <!-- Nested Field -->
  <rect x="125" y="320" width="110" height="36" rx="6" fill="#15803d" filter="url(#s)"/>
  <text x="180" y="343" text-anchor="middle" fill="white" font-size="9" font-weight="600">Field.* (вложенные)</text>

  <!-- Form.Button.Submit -->
  <rect x="430" y="230" width="160" height="40" rx="8" fill="#dc2626" filter="url(#s)"/>
  <text x="510" y="255" text-anchor="middle" fill="white" font-size="11" font-weight="600">&lt;Form.Button.Submit&gt;</text>
  <text x="510" y="284" text-anchor="middle" fill="#fca5a5" font-size="9">canSubmit, isSubmitting</text>
  <line x1="510" y1="180" x2="510" y2="230" stroke="#475569" stroke-width="1.5"/>

  <!-- Легенда -->
  <rect x="20" y="388" width="660" height="80" rx="8" fill="#1e293b" opacity="0.5"/>
  <text x="40" y="410" fill="#94a3b8" font-size="11" font-weight="600">Контексты:</text>

  <rect x="40" y="420" width="12" height="12" rx="3" fill="#7c3aed"/>
  <text x="58" y="431" fill="#c4b5fd" font-size="10">FormContext — TanStack Form instance, schema, submit</text>

  <rect x="40" y="438" width="12" height="12" rx="3" fill="#2563eb"/>
  <text x="58" y="449" fill="#93c5fd" font-size="10">GroupContext — path prefix (user.addresses[0])</text>

  <rect x="370" y="420" width="12" height="12" rx="3" fill="#16a34a"/>
  <text x="388" y="431" fill="#86efac" font-size="10">FieldContext — name, value, errors, meta</text>

  <rect x="370" y="438" width="12" height="12" rx="3" fill="#0891b2"/>
  <text x="388" y="449" fill="#67e8f9" font-size="10">StepsContext — activeStep, navigation</text>
</svg>
